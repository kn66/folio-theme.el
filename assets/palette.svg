<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">folio-theme palette</title>
  <desc id="desc">Color palette swatches for the folio Emacs theme.</desc>
  <rect width="960" height="500" fill="#FFFBF0"/>
  <text x="32" y="52" fill="#2C2924" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="700">folio-theme palette</text>
  <text x="32" y="82" fill="#7A7165" font-family="Inter, Segoe UI, sans-serif" font-size="14">Off-white paper base, deep blue structure, restrained red exceptions, and AA-floor syntax colors</text>

  <g font-family="Inter, Segoe UI, sans-serif" font-size="13">
    <g transform="translate(32 116)">
      <rect width="124" height="72" rx="6" fill="#FFFBF0" stroke="#DDD4C2"/>
      <text x="12" y="96" fill="#2C2924" font-weight="700">bg-main</text>
      <text x="12" y="116" fill="#7A7165">#FFFBF0</text>
    </g>
    <g transform="translate(166 116)">
      <rect width="124" height="72" rx="6" fill="#F7F2E7" stroke="#DDD4C2"/>
      <text x="12" y="96" fill="#2C2924" font-weight="700">bg-dim</text>
      <text x="12" y="116" fill="#7A7165">#F7F2E7</text>
    </g>
    <g transform="translate(300 116)">
      <rect width="124" height="72" rx="6" fill="#EEE5CF" stroke="#DDD4C2"/>
      <text x="12" y="96" fill="#2C2924" font-weight="700">bg-alt</text>
      <text x="12" y="116" fill="#7A7165">#EEE5CF</text>
    </g>
    <g transform="translate(434 116)">
      <rect width="124" height="72" rx="6" fill="#2C2924"/>
      <text x="12" y="96" fill="#2C2924" font-weight="700">fg-main</text>
      <text x="12" y="116" fill="#7A7165">#2C2924</text>
    </g>
    <g transform="translate(568 116)">
      <rect width="124" height="72" rx="6" fill="#6B6459"/>
      <text x="12" y="96" fill="#2C2924" font-weight="700">fg-dim</text>
      <text x="12" y="116" fill="#7A7165">#6B6459</text>
    </g>
    <g transform="translate(702 116)">
      <rect width="124" height="72" rx="6" fill="#7A7165"/>
      <text x="12" y="96" fill="#2C2924" font-weight="700">fg-alt</text>
      <text x="12" y="116" fill="#7A7165">#7A7165</text>
    </g>
  </g>

  <text x="32" y="270" fill="#2C2924" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700">Syntax foregrounds</text>
